<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <radialGradient id="glow-hd-lrn" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#09090B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="800" fill="#09090B"/>
  <rect width="1200" height="800" fill="url(#glow-hd-lrn)"/>
  <!-- Governance network  connected nodes -->
  <!-- Central product node -->
  <circle cx="600" cy="400" r="30" fill="#FB923C" opacity="0.45"/>
  <!-- Satellite nodes -->
  <circle cx="380" cy="240" r="18" fill="#F97316" opacity="0.4"/>
  <circle cx="820" cy="240" r="18" fill="#F97316" opacity="0.4"/>
  <circle cx="250" cy="450" r="18" fill="#E11D48" opacity="0.35"/>
  <circle cx="950" cy="450" r="18" fill="#E11D48" opacity="0.35"/>
  <circle cx="380" cy="580" r="18" fill="#F97316" opacity="0.35"/>
  <circle cx="820" cy="580" r="18" fill="#F97316" opacity="0.35"/>
  <!-- Connections -->
  <line x1="600" y1="400" x2="380" y2="240" stroke="#FB923C" stroke-width="1.5" opacity="0.3"/>
  <line x1="600" y1="400" x2="820" y2="240" stroke="#FB923C" stroke-width="1.5" opacity="0.3"/>
  <line x1="600" y1="400" x2="250" y2="450" stroke="#E11D48" stroke-width="1.5" opacity="0.25"/>
  <line x1="600" y1="400" x2="950" y2="450" stroke="#E11D48" stroke-width="1.5" opacity="0.25"/>
  <line x1="600" y1="400" x2="380" y2="580" stroke="#FB923C" stroke-width="1.5" opacity="0.3"/>
  <line x1="600" y1="400" x2="820" y2="580" stroke="#FB923C" stroke-width="1.5" opacity="0.3"/>
  <!-- Secondary connections (governance mesh) -->
  <line x1="380" y1="240" x2="820" y2="240" stroke="#52525B" stroke-width="0.8" opacity="0.25"/>
  <line x1="380" y1="580" x2="820" y2="580" stroke="#52525B" stroke-width="0.8" opacity="0.25"/>
  <line x1="250" y1="450" x2="380" y2="240" stroke="#52525B" stroke-width="0.8" opacity="0.2"/>
  <line x1="950" y1="450" x2="820" y2="240" stroke="#52525B" stroke-width="0.8" opacity="0.2"/>
  <!-- Outer ring -->
  <circle cx="600" cy="400" r="300" fill="none" stroke="#FB923C" stroke-width="0.6" opacity="0.12"/>
  <!-- Quote mark -->
  <text x="200" y="720" font-family="Georgia, serif" font-size="260" fill="#FB923C" opacity="0.05">"</text>
