<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <radialGradient id="glow-hd-res" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FB923C" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#09090B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bar-hd" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#C2410C"/>
      <stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="#09090B"/>
  <rect width="1200" height="800" fill="url(#glow-hd-res)"/>
  <!-- Bar chart  4 results bars -->
  <rect x="160" y="320" width="100" height="380" rx="4" fill="url(#bar-hd)" opacity="0.45"/>
  <rect x="340" y="220" width="100" height="480" rx="4" fill="url(#bar-hd)" opacity="0.5"/>
  <rect x="520" y="160" width="100" height="540" rx="4" fill="url(#bar-hd)" opacity="0.55"/>
  <rect x="700" y="100" width="100" height="600" rx="4" fill="url(#bar-hd)" opacity="0.6"/>
  <!-- Baseline -->
  <line x1="120" y1="700" x2="850" y2="700" stroke="#27272A" stroke-width="1" opacity="0.5"/>
  <!-- 35% badge -->
  <text x="950" y="380" font-family="system-ui, sans-serif" font-size="160" font-weight="800" fill="#FB923C" opacity="0.1" text-anchor="middle">35%</text>
  <!-- 4.8 rating badge -->
  <circle cx="1050" cy="560" r="80" fill="none" stroke="#FB923C" stroke-width="1.5" opacity="0.3"/>
  <text x="1050" y="580" font-family="system-ui, sans-serif" font-size="48" font-weight="700" fill="#FB923C" opacity="0.35" text-anchor="middle">4.8</text>
  <!-- Arrow up on last bar -->
  <path d="M 750 100 L 735 130 M 750 100 L 765 130" stroke="#FB923C" stroke-width="2.5" opacity="0.7"/>
</svg>
