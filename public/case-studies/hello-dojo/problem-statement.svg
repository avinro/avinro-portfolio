<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <radialGradient id="glow-hd-ps" cx="35%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#FB923C" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#09090B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-hd-ps2" cx="75%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#E11D48" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#09090B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="800" fill="#09090B"/>
  <rect width="1200" height="800" fill="url(#glow-hd-ps)"/>
  <rect width="1200" height="800" fill="url(#glow-hd-ps2)"/>
  <!-- Three fragmented/disconnected rectangles representing three separate products -->
  <!-- Product A  customer app -->
  <rect x="80" y="200" width="280" height="380" rx="8" fill="none" stroke="#FB923C" stroke-width="1.5" opacity="0.4"/>
  <rect x="90" y="210" width="260" height="60" rx="4" fill="#FB923C" opacity="0.08"/>
  <!-- Product B  driver app (rotated/offset = fragmentation) -->
  <rect x="460" y="160" width="280" height="380" rx="8" fill="none" stroke="#F97316" stroke-width="1.5" opacity="0.35" transform="rotate(3, 600, 350)"/>
  <rect x="470" y="170" width="260" height="60" rx="4" fill="#F97316" opacity="0.07" transform="rotate(3, 600, 350)"/>
  <!-- Product C  vendor portal -->
  <rect x="840" y="220" width="280" height="380" rx="8" fill="none" stroke="#E11D48" stroke-width="1.5" opacity="0.35" transform="rotate(-2, 980, 410)"/>
  <rect x="850" y="230" width="260" height="60" rx="4" fill="#E11D48" opacity="0.07" transform="rotate(-2, 980, 410)"/>
  <!-- Disconnect slash between them -->
  <line x1="380" y1="350" x2="440" y2="370" stroke="#52525B" stroke-width="3" opacity="0.5" stroke-dasharray="8 6"/>
  <line x1="760" y1="350" x2="820" y2="370" stroke="#52525B" stroke-width="3" opacity="0.5" stroke-dasharray="8 6"/>
  <!-- Warning label top right -->
  <text x="950" y="130" font-family="system-ui, sans-serif" font-size="200" font-weight="800" fill="#FB923C" opacity="0.05" text-anchor="middle">3</text>
</svg>
