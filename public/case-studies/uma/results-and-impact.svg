<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <radialGradient id="glow-res" cx="55%" cy="55%" r="60%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#09090B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bar-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="#09090B"/>
  <rect width="1200" height="800" fill="url(#glow-res)"/>
  <!-- Upward trend line -->
  <polyline points="120,640 280,580 440,500 600,380 760,260 920,180 1080,100"
            stroke="#8B5CF6" stroke-width="2.5" fill="none" opacity="0.5"/>
  <!-- Area fill below trend -->
  <polygon points="120,640 280,580 440,500 600,380 760,260 920,180 1080,100 1080,720 120,720"
           fill="#8B5CF6" opacity="0.06"/>
  <!-- Data point dots -->
  <circle cx="280" cy="580" r="6" fill="#A78BFA" opacity="0.7"/>
  <circle cx="440" cy="500" r="6" fill="#A78BFA" opacity="0.7"/>
  <circle cx="600" cy="380" r="8" fill="#8B5CF6" opacity="0.8"/>
  <circle cx="760" cy="260" r="6" fill="#A78BFA" opacity="0.7"/>
  <circle cx="920" cy="180" r="6" fill="#A78BFA" opacity="0.7"/>
  <circle cx="1080" cy="100" r="10" fill="#8B5CF6" opacity="0.9"/>
  <!-- Baseline -->
  <line x1="100" y1="720" x2="1100" y2="720" stroke="#27272A" stroke-width="1" opacity="0.5"/>
  <!-- KPI numbers (large, subtle) -->
  <text x="200" y="320" font-family="system-ui, sans-serif" font-size="96" font-weight="800" fill="#8B5CF6" opacity="0.1" text-anchor="middle">6w</text>
  <text x="600" y="720" font-family="system-ui, sans-serif" font-size="96" font-weight="800" fill="#A78BFA" opacity="0.08" text-anchor="middle">87%</text>
  <!-- Arrow up -->
  <path d="M 1080 100 L 1065 125 M 1080 100 L 1095 125" stroke="#8B5CF6" stroke-width="2.5" opacity="0.6"/>
</svg>
