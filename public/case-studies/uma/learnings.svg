<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <radialGradient id="glow-lrn" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#09090B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="800" fill="#09090B"/>
  <rect width="1200" height="800" fill="url(#glow-lrn)"/>
  <!-- Spiral / reflection motif -->
  <circle cx="600" cy="400" r="40"  fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.6"/>
  <circle cx="600" cy="400" r="90"  fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.4"/>
  <circle cx="600" cy="400" r="150" fill="none" stroke="#8B5CF6" stroke-width="0.8" opacity="0.3"/>
  <circle cx="600" cy="400" r="220" fill="none" stroke="#8B5CF6" stroke-width="0.6" opacity="0.2"/>
  <circle cx="600" cy="400" r="300" fill="none" stroke="#8B5CF6" stroke-width="0.4" opacity="0.12"/>
  <!-- Centre dot -->
  <circle cx="600" cy="400" r="8" fill="#A78BFA" opacity="0.7"/>
  <!-- Radiating lines -->
  <line x1="600" y1="400" x2="600" y2="100" stroke="#8B5CF6" stroke-width="0.8" opacity="0.15"/>
  <line x1="600" y1="400" x2="860" y2="250" stroke="#8B5CF6" stroke-width="0.8" opacity="0.15"/>
  <line x1="600" y1="400" x2="860" y2="550" stroke="#8B5CF6" stroke-width="0.8" opacity="0.15"/>
  <line x1="600" y1="400" x2="600" y2="700" stroke="#8B5CF6" stroke-width="0.8" opacity="0.15"/>
  <line x1="600" y1="400" x2="340" y2="550" stroke="#8B5CF6" stroke-width="0.8" opacity="0.15"/>
  <line x1="600" y1="400" x2="340" y2="250" stroke="#8B5CF6" stroke-width="0.8" opacity="0.15"/>
  <!-- Quote mark, large subtle -->
  <text x="150" y="560" font-family="Georgia, serif" font-size="300" fill="#8B5CF6" opacity="0.05">"</text>
</svg>
