<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="pine-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050D09"/>
      <stop offset="100%" stop-color="#09090B"/>
    </linearGradient>
    <linearGradient id="pine-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <radialGradient id="pine-glow" cx="80%" cy="30%">
      <stop offset="0%" stop-color="#059669" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pine-amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#pine-bg)"/>
  <ellipse cx="1300" cy="200" rx="700" ry="500" fill="url(#pine-glow)"/>

  <!-- Subtle grid -->
  <line x1="0" y1="300" x2="1600" y2="300" stroke="#1C1C1E" stroke-width="1"/>
  <line x1="0" y1="600" x2="1600" y2="600" stroke="#1C1C1E" stroke-width="1"/>
  <line x1="533" y1="0" x2="533" y2="900" stroke="#1C1C1E" stroke-width="1"/>
  <line x1="1067" y1="0" x2="1067" y2="900" stroke="#1C1C1E" stroke-width="1"/>

  <!-- Green accent bar  left edge -->
  <rect x="0" y="0" width="5" height="900" fill="url(#pine-green)"/>

  <!-- Left: hero copy -->
  <text x="80" y="140" font-family="system-ui, sans-serif" font-size="72" font-weight="700" fill="#FAFAFA" letter-spacing="-2">PineApp</text>
  <text x="82" y="200" font-family="system-ui, sans-serif" font-size="28" font-weight="400" fill="#059669" letter-spacing="1">Pre-Visit Flow</text>
  <text x="82" y="248" font-family="system-ui, sans-serif" font-size="15" fill="#71717A" letter-spacing="0.5">Baptist Health · Healthcare · Mobile · 2023</text>

  <!-- Tag pills -->
  <rect x="82" y="276" width="104" height="28" rx="14" fill="#0A1F16" stroke="#1A3D2A" stroke-width="1"/>
  <text x="134" y="295" font-family="system-ui, sans-serif" font-size="11" fill="#059669" text-anchor="middle">Healthcare</text>
  <rect x="198" y="276" width="88" height="28" rx="14" fill="#0A1F16" stroke="#1A3D2A" stroke-width="1"/>
  <text x="242" y="295" font-family="system-ui, sans-serif" font-size="11" fill="#059669" text-anchor="middle">Mobile UI</text>
  <rect x="298" y="276" width="72" height="28" rx="14" fill="#0A1F16" stroke="#1A3D2A" stroke-width="1"/>
  <text x="334" y="295" font-family="system-ui, sans-serif" font-size="11" fill="#059669" text-anchor="middle">Shipped</text>

  <!-- Divider -->
  <line x1="82" y1="340" x2="480" y2="340" stroke="#1C1C1E" stroke-width="1"/>

  <!-- Left: role summary -->
  <text x="82" y="376" font-family="system-ui, sans-serif" font-size="14" fill="#71717A">Senior Product Designer  ·  110 Theory</text>
  <text x="82" y="400" font-family="system-ui, sans-serif" font-size="14" fill="#71717A">Shipped to production</text>

  <!-- Left: description -->
  <text x="82" y="460" font-family="system-ui, sans-serif" font-size="16" fill="#A1A1AA" letter-spacing="0">Digitized the hospital pre-registration process for</text>
  <text x="82" y="484" font-family="system-ui, sans-serif" font-size="16" fill="#A1A1AA">patients. Paper forms to step-by-step mobile flow.</text>

  <!-- Phone frame  main (checklist) -->
  <rect x="680" y="60" width="300" height="600" rx="40" fill="#0D0D0D" stroke="#1C1C1E" stroke-width="2"/>
  <rect x="692" y="76" width="276" height="568" rx="30" fill="#101410"/>
  <!-- Notch -->
  <rect x="790" y="84" width="100" height="22" rx="11" fill="#0D0D0D"/>
  <!-- Status bar -->
  <text x="708" y="102" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">9:41</text>
  <text x="960" y="102" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280" text-anchor="end">100%</text>

  <!-- Screen header -->
  <text x="830" y="138" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#FAFAFA" text-anchor="middle">Pre-Registration</text>

  <!-- Appointment accordion -->
  <rect x="704" y="152" width="252" height="48" rx="10" fill="#0D1F16" stroke="#1A3D2A" stroke-width="1"/>
  <text x="720" y="172" font-family="system-ui, sans-serif" font-size="10" fill="#059669">Cardiology  Dr. Morales</text>
  <text x="720" y="188" font-family="system-ui, sans-serif" font-size="9" fill="#4B5563">Mon, Sep 18 · 10:30 AM</text>
  <text x="944" y="181" font-family="system-ui, sans-serif" font-size="12" fill="#6B7280" text-anchor="end">v</text>

  <!-- Checklist items -->
  <!-- Completed item -->
  <rect x="704" y="212" width="252" height="52" rx="8" fill="#111811" stroke="#1C2A1C" stroke-width="1"/>
  <rect x="716" y="228" width="56" height="20" rx="10" fill="#0A1F0A" stroke="#1A3D1A" stroke-width="1"/>
  <text x="744" y="242" font-family="system-ui, sans-serif" font-size="9" fill="#22C55E" text-anchor="middle">Completed</text>
  <text x="716" y="254" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">Insurance Card</text>
  <text x="944" y="242" font-family="system-ui, sans-serif" font-size="14" fill="#22C55E" text-anchor="end"></text>

  <!-- Needs Review item -->
  <rect x="704" y="274" width="252" height="52" rx="8" fill="#1A1200" stroke="#2A2000" stroke-width="1"/>
  <rect x="716" y="290" width="76" height="20" rx="10" fill="#1A1200" stroke="#3A2800" stroke-width="1"/>
  <text x="754" y="304" font-family="system-ui, sans-serif" font-size="9" fill="#D97706" text-anchor="middle">Needs Review</text>
  <text x="716" y="316" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">Consent Form</text>
  <text x="944" y="304" font-family="system-ui, sans-serif" font-size="14" fill="#D97706" text-anchor="end">!</text>

  <!-- Not Started item -->
  <rect x="704" y="336" width="252" height="52" rx="8" fill="#121212" stroke="#1C1C1E" stroke-width="1"/>
  <rect x="716" y="352" width="70" height="20" rx="10" fill="#1A1A1A" stroke="#2A2A2A" stroke-width="1"/>
  <text x="751" y="366" font-family="system-ui, sans-serif" font-size="9" fill="#71717A" text-anchor="middle">Not Started</text>
  <text x="716" y="378" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">License / ID</text>
  <text x="944" y="366" font-family="system-ui, sans-serif" font-size="14" fill="#71717A" text-anchor="end">:</text>

  <!-- Another Completed item -->
  <rect x="704" y="398" width="252" height="52" rx="8" fill="#111811" stroke="#1C2A1C" stroke-width="1"/>
  <rect x="716" y="414" width="56" height="20" rx="10" fill="#0A1F0A" stroke="#1A3D1A" stroke-width="1"/>
  <text x="744" y="428" font-family="system-ui, sans-serif" font-size="9" fill="#22C55E" text-anchor="middle">Completed</text>
  <text x="716" y="440" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">MSPQ Form</text>
  <text x="944" y="428" font-family="system-ui, sans-serif" font-size="14" fill="#22C55E" text-anchor="end"></text>

  <!-- Sticky CTA -->
  <rect x="692" y="576" width="276" height="56" rx="0" fill="#0D0D0D"/>
  <rect x="692" y="576" width="276" height="1" fill="#1C1C1E"/>
  <rect x="712" y="584" width="236" height="40" rx="20" fill="url(#pine-green)"/>
  <text x="830" y="609" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#FAFAFA" text-anchor="middle">Continue</text>

  <!-- Phone frame  secondary (appointment card) -->
  <rect x="1060" y="120" width="260" height="520" rx="34" fill="#0D0D0D" stroke="#1C1C1E" stroke-width="1.5" opacity="0.9"/>
  <rect x="1071" y="134" width="238" height="492" rx="26" fill="#101010" opacity="0.9"/>
  <!-- Notch -->
  <rect x="1165" y="142" width="80" height="18" rx="9" fill="#0D0D0D"/>
  <text x="1083" y="160" font-family="system-ui, sans-serif" font-size="9" fill="#6B7280">9:41</text>
  <text x="1302" y="160" font-family="system-ui, sans-serif" font-size="9" fill="#6B7280" text-anchor="end">100%</text>
  <text x="1190" y="192" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#FAFAFA" text-anchor="middle">Home</text>

  <!-- Appointment card -->
  <rect x="1083" y="208" width="214" height="140" rx="14" fill="#131313" stroke="#1C1C1E" stroke-width="1"/>
  <text x="1097" y="230" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#FAFAFA">Cardiology Appointment</text>
  <text x="1097" y="248" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">Mon, Sep 18 · 10:30 AM</text>
  <text x="1097" y="264" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">Baptist Health  South Miami</text>
  <line x1="1083" y1="278" x2="1297" y2="278" stroke="#1C1C1E" stroke-width="1"/>
  <!-- Pre-Register CTA -->
  <rect x="1097" y="288" width="186" height="36" rx="18" fill="url(#pine-green)"/>
  <text x="1190" y="311" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#FAFAFA" text-anchor="middle">Pre-Register</text>
  <!-- Hint text -->
  <text x="1190" y="335" font-family="system-ui, sans-serif" font-size="9" fill="#6B7280" text-anchor="middle">Tap to start pre-registration</text>

  <!-- Wordmark footer -->
  <rect x="80" y="840" width="5" height="36" rx="2.5" fill="url(#pine-green)"/>
  <text x="98" y="860" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#FAFAFA" letter-spacing="0.5">PINEAPP</text>
  <text x="98" y="877" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563" letter-spacing="1">PRE-VISIT FLOW · BAPTIST HEALTH · 2023</text>
</svg>
