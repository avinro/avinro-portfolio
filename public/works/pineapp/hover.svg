<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 224" width="400" height="224">
  <defs>
    <linearGradient id="hov-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050D09"/>
      <stop offset="100%" stop-color="#09090B"/>
    </linearGradient>
    <linearGradient id="hov-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <radialGradient id="hov-glow" cx="70%" cy="40%">
      <stop offset="0%" stop-color="#059669" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="400" height="224" fill="url(#hov-bg)"/>
  <ellipse cx="320" cy="80" rx="240" ry="160" fill="url(#hov-glow)"/>

  <!-- Subtle grid -->
  <line x1="0" y1="75" x2="400" y2="75" stroke="#1C1C1E" stroke-width="1"/>
  <line x1="0" y1="150" x2="400" y2="150" stroke="#1C1C1E" stroke-width="1"/>
  <line x1="133" y1="0" x2="133" y2="224" stroke="#1C1C1E" stroke-width="1"/>
  <line x1="267" y1="0" x2="267" y2="224" stroke="#1C1C1E" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="3" height="224" fill="url(#hov-green)"/>

  <!-- Wordmark -->
  <text x="20" y="110" font-family="system-ui, sans-serif" font-size="38" font-weight="700" fill="#FAFAFA" letter-spacing="-1">PineApp</text>
  <text x="22" y="138" font-family="system-ui, sans-serif" font-size="14" font-weight="400" fill="#059669" letter-spacing="0.5">Pre-Visit Flow</text>
  <text x="22" y="158" font-family="system-ui, sans-serif" font-size="10" fill="#71717A">Baptist Health · 2023</text>

  <!-- Green accent rule -->
  <rect x="20" y="190" width="40" height="3" rx="1.5" fill="url(#hov-green)"/>
