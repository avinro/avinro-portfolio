<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0A1A"/>
      <stop offset="100%" stop-color="#110D24"/>
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6334D0"/>
      <stop offset="100%" stop-color="#DA62F7"/>
    </linearGradient>
    <radialGradient id="orb1" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#6334D0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6334D0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#DA62F7" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#DA62F7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <ellipse cx="400" cy="450" rx="500" ry="380" fill="url(#orb1)"/>
  <ellipse cx="1200" cy="300" rx="380" ry="300" fill="url(#orb2)"/>

  <!-- Grid lines -->
  <line x1="0" y1="300" x2="1600" y2="300" stroke="#1E1433" stroke-width="1"/>
  <line x1="0" y1="600" x2="1600" y2="600" stroke="#1E1433" stroke-width="1"/>
  <line x1="533" y1="0" x2="533" y2="900" stroke="#1E1433" stroke-width="1"/>
  <line x1="1067" y1="0" x2="1067" y2="900" stroke="#1E1433" stroke-width="1"/>

  <!-- Desktop browser frame -->
  <rect x="80" y="120" width="900" height="580" rx="12" fill="#1A1230" stroke="#2D1F55" stroke-width="1.5"/>
  <rect x="80" y="120" width="900" height="36" rx="12" fill="#211840"/>
  <rect x="80" y="144" width="900" height="12" fill="#211840"/>
  <!-- Browser chrome dots -->
  <circle cx="114" cy="138" r="5" fill="#FF5F57" opacity="0.7"/>
  <circle cx="134" cy="138" r="5" fill="#FFBD2E" opacity="0.7"/>
  <circle cx="154" cy="138" r="5" fill="#28CA41" opacity="0.7"/>
  <!-- URL bar -->
  <rect x="240" y="128" width="400" height="20" rx="10" fill="#2D1F55"/>
  <text x="440" y="142" font-family="system-ui, sans-serif" font-size="10" fill="#6334D0" text-anchor="middle">domainplug.io</text>

  <!-- Desktop screen: nav -->
  <rect x="96" y="156" width="868" height="44" rx="0" fill="#1A1230"/>
  <text x="120" y="183" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">DomainPlug</text>
  <rect x="700" y="166" width="80" height="24" rx="6" fill="url(#purple-glow)"/>
  <text x="740" y="183" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Register</text>

  <!-- Desktop screen: hero -->
  <text x="530" y="250" font-family="system-ui, sans-serif" font-size="32" font-weight="700" fill="#FFFFFF" text-anchor="middle">Register up to 20 .eth</text>
  <text x="530" y="285" font-family="system-ui, sans-serif" font-size="32" font-weight="700" fill="url(#purple-glow)" text-anchor="middle">domains in one go.</text>
  <!-- Search bar -->
  <rect x="200" y="310" width="460" height="44" rx="22" fill="#211840" stroke="#6334D0" stroke-width="1.5"/>
  <text x="430" y="338" font-family="system-ui, sans-serif" font-size="13" fill="#4A3872" text-anchor="middle">Search for .eth domains...</text>
  <rect x="610" y="310" width="90" height="44" rx="22" fill="url(#purple-glow)"/>
  <text x="655" y="338" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle">Search</text>

  <!-- Domain cards row -->
  <rect x="120" y="390" width="168" height="80" rx="10" fill="#211840" stroke="#2D1F55" stroke-width="1"/>
  <text x="204" y="428" font-family="system-ui, monospace" font-size="13" font-weight="600" fill="#DA62F7" text-anchor="middle">vitalik.eth</text>
  <text x="204" y="452" font-family="system-ui, sans-serif" font-size="11" fill="#6334D0" text-anchor="middle">0.004 ETH</text>
  <rect x="304" y="390" width="168" height="80" rx="10" fill="#211840" stroke="#2D1F55" stroke-width="1"/>
  <text x="388" y="428" font-family="system-ui, monospace" font-size="13" font-weight="600" fill="#DA62F7" text-anchor="middle">defi.eth</text>
  <text x="388" y="452" font-family="system-ui, sans-serif" font-size="11" fill="#6334D0" text-anchor="middle">0.012 ETH</text>
  <rect x="488" y="390" width="168" height="80" rx="10" fill="#211840" stroke="#6334D0" stroke-width="1.5"/>
  <text x="572" y="428" font-family="system-ui, monospace" font-size="13" font-weight="600" fill="#DA62F7" text-anchor="middle">nfts.eth</text>
  <text x="572" y="452" font-family="system-ui, sans-serif" font-size="11" fill="#6334D0" text-anchor="middle">0.008 ETH</text>
  <rect x="672" y="390" width="168" height="80" rx="10" fill="#211840" stroke="#2D1F55" stroke-width="1"/>
  <text x="756" y="428" font-family="system-ui, monospace" font-size="13" font-weight="600" fill="#DA62F7" text-anchor="middle">web3.eth</text>
  <text x="756" y="452" font-family="system-ui, sans-serif" font-size="11" fill="#6334D0" text-anchor="middle">0.005 ETH</text>

  <!-- Mobile frame -->
  <rect x="1060" y="100" width="260" height="520" rx="32" fill="#1A1230" stroke="#2D1F55" stroke-width="2"/>
  <rect x="1070" y="120" width="240" height="480" rx="22" fill="#0D0A1A"/>
  <!-- Mobile notch -->
  <rect x="1150" y="128" width="80" height="18" rx="9" fill="#1A1230"/>
  <!-- Mobile nav -->
  <text x="1190" y="170" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">DomainPlug</text>
  <!-- Mobile hero -->
  <text x="1190" y="210" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">Bulk .eth</text>
  <text x="1190" y="230" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="url(#purple-glow)" text-anchor="middle">registration.</text>
  <!-- Mobile search -->
  <rect x="1085" y="248" width="210" height="36" rx="18" fill="#211840" stroke="#6334D0" stroke-width="1"/>
  <text x="1190" y="271" font-family="system-ui, sans-serif" font-size="10" fill="#4A3872" text-anchor="middle">Search domains...</text>
  <!-- Mobile cards -->
  <rect x="1085" y="300" width="210" height="60" rx="10" fill="#211840" stroke="#2D1F55" stroke-width="1"/>
  <text x="1190" y="328" font-family="system-ui, monospace" font-size="12" font-weight="600" fill="#DA62F7" text-anchor="middle">vitalik.eth</text>
  <text x="1190" y="348" font-family="system-ui, sans-serif" font-size="10" fill="#6334D0" text-anchor="middle">0.004 ETH · Available</text>
  <rect x="1085" y="372" width="210" height="60" rx="10" fill="#211840" stroke="#2D1F55" stroke-width="1"/>
  <text x="1190" y="400" font-family="system-ui, monospace" font-size="12" font-weight="600" fill="#DA62F7" text-anchor="middle">defi.eth</text>
  <text x="1190" y="420" font-family="system-ui, sans-serif" font-size="10" fill="#6334D0" text-anchor="middle">0.012 ETH · Available</text>
  <rect x="1085" y="444" width="210" height="44" rx="10" fill="url(#purple-glow)"/>
  <text x="1190" y="471" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">Register 2 domains</text>

  <!-- Label -->
  <rect x="80" y="820" width="4" height="40" rx="2" fill="url(#purple-glow)"/>
  <text x="96" y="838" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#FFFFFF">DomainPlug</text>
  <text x="96" y="856" font-family="system-ui, sans-serif" font-size="11" fill="#6B4FA0">Bulk ENS domain marketplace · 20222023</text>
</svg>
