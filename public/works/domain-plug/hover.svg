  <rect x="200" y="820" width="4" height="40" rx="2" fill="url(#grad-h)"/>
  <text x="216" y="838" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#FFFFFF">DomainPlug · Bulk Generator</text>
  <text x="216" y="856" font-family="system-ui, sans-serif" font-size="11" fill="#6B4FA0">Select and register up to 20 .eth domains in one transaction</text>
