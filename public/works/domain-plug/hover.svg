  <rect x="240" y="334" width="1120" height="52" rx="8" fill="#211840" stroke="#2D1F55" stroke-width="1"/>
  <rect x="260" y="348" width="20" height="20" rx="4" fill="#211840" stroke="#6334D0" stroke-width="1.5"/>
  <text x="302" y="364" font-family="system-ui, monospace" font-size="14" font-weight="600" fill="#FFFFFF">defi.eth</text>
  <text x="800" y="364" font-family="system-ui, sans-serif" font-size="13" fill="#A78BCA" text-anchor="middle">Available</text>
  <text x="1290" y="364" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="end">0.012 ETH</text>

  <rect x="240" y="398" width="1120" height="52" rx="8" fill="#211840" stroke="#6334D0" stroke-width="1.5"/>
  <rect x="260" y="412" width="20" height="20" rx="4" fill="#6334D0"/>
  <text x="302" y="428" font-family="system-ui, monospace" font-size="14" font-weight="600" fill="#DA62F7">nfts.eth</text>
  <text x="800" y="428" font-family="system-ui, sans-serif" font-size="13" fill="#A78BCA" text-anchor="middle">Available</text>
  <text x="1290" y="428" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="end">0.008 ETH</text>

  <rect x="240" y="462" width="1120" height="52" rx="8" fill="#211840" stroke="#2D1F55" stroke-width="1"/>
  <rect x="260" y="476" width="20" height="20" rx="4" fill="#211840" stroke="#6334D0" stroke-width="1.5"/>
  <text x="302" y="492" font-family="system-ui, monospace" font-size="14" font-weight="600" fill="#FFFFFF">web3.eth</text>
  <text x="800" y="492" font-family="system-ui, sans-serif" font-size="13" fill="#4A3872" text-anchor="middle">Taken</text>
