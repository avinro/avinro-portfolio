  <text x="900" y="582" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">Total: 0.012 ETH</text>
  <rect x="1060" y="558" width="300" height="44" rx="22" fill="url(#grad-h)"/>
  <text x="1210" y="585" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">Register 2 domains ’</text>

