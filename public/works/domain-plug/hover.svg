  <text x="302" y="300" font-family="system-ui, monospace" font-size="14" font-weight="600" fill="#DA62F7">vitalik.eth</text>
  <text x="800" y="300" font-family="system-ui, sans-serif" font-size="13" fill="#A78BCA" text-anchor="middle">Available</text>
