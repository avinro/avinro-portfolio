<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="bg-h" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0A1A"/>
      <stop offset="100%" stop-color="#110D24"/>
    </linearGradient>
    <linearGradient id="grad-h" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6334D0"/>
      <stop offset="100%" stop-color="#DA62F7"/>
    </linearGradient>
    <radialGradient id="glow-h" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#6334D0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6334D0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg-h)"/>
  <ellipse cx="800" cy="450" rx="700" ry="500" fill="url(#glow-h)"/>

  <!-- Grid lines -->
  <line x1="0" y1="300" x2="1600" y2="300" stroke="#1E1433" stroke-width="1"/>
  <line x1="0" y1="600" x2="1600" y2="600" stroke="#1E1433" stroke-width="1"/>
  <line x1="533" y1="0" x2="533" y2="900" stroke="#1E1433" stroke-width="1"/>
  <line x1="1067" y1="0" x2="1067" y2="900" stroke="#1E1433" stroke-width="1"/>

