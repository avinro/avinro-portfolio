<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <rect width="800" height="1000" fill="#0F172A"/>
  <!-- Background gradient blobs -->
  <circle cx="200" cy="300" r="280" fill="#1E3A5F" opacity="0.6"/>
  <circle cx="600" cy="700" r="220" fill="#0D2B47" opacity="0.5"/>
  <!-- Phone frame -->
  <rect x="280" y="120" width="240" height="480" rx="28" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
  <rect x="288" y="140" width="224" height="440" rx="20" fill="#0F172A"/>
  <!-- Status bar notch -->
  <rect x="340" y="148" width="120" height="16" rx="8" fill="#1E293B"/>
  <!-- Screen content: balance card -->
  <rect x="300" y="180" width="200" height="100" rx="12" fill="#1E40AF"/>
  <text x="400" y="215" font-family="system-ui" font-size="11" fill="#93C5FD" text-anchor="middle">Total Balance</text>
  <text x="400" y="250" font-family="system-ui" font-size="22" font-weight="700" fill="#FFFFFF" text-anchor="middle">$4,820.00</text>
  <!-- Screen content: action row -->
  <rect x="308" y="298" width="48" height="48" rx="12" fill="#1E293B"/>
  <rect x="376" y="298" width="48" height="48" rx="12" fill="#1E293B"/>
  <rect x="444" y="298" width="48" height="48" rx="12" fill="#1E293B"/>
  <!-- Screen content: transaction rows -->
  <rect x="300" y="370" width="200" height="12" rx="4" fill="#1E293B"/>
  <rect x="300" y="392" width="200" height="12" rx="4" fill="#1E293B"/>
  <rect x="300" y="414" width="160" height="12" rx="4" fill="#1E293B"/>
  <!-- Bottom nav -->
  <rect x="288" y="540" width="224" height="40" rx="0" fill="#1E293B"/>
  <!-- Label -->
  <text x="400" y="680" font-family="system-ui" font-size="13" fill="#64748B" text-anchor="middle">Aurora · Mobile Banking</text>
  <text x="400" y="700" font-family="system-ui" font-size="11" fill="#475569" text-anchor="middle">Onboarding flow redesign</text>
</svg>
