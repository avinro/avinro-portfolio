<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <rect width="800" height="1000" fill="#FAFAFA"/>
  <!-- Token swatches -->
  <rect x="60" y="80" width="80" height="80" rx="8" fill="#18181B"/>
  <rect x="160" y="80" width="80" height="80" rx="8" fill="#3F3F46"/>
  <rect x="260" y="80" width="80" height="80" rx="8" fill="#71717A"/>
  <rect x="360" y="80" width="80" height="80" rx="8" fill="#A1A1AA"/>
  <rect x="460" y="80" width="80" height="80" rx="8" fill="#D4D4D8"/>
  <rect x="560" y="80" width="80" height="80" rx="8" fill="#F4F4F5" stroke="#E4E4E7" stroke-width="1"/>
  <!-- Typography scale -->
  <text x="60" y="230" font-family="system-ui" font-size="36" font-weight="700" fill="#18181B">Display</text>
  <text x="60" y="272" font-family="system-ui" font-size="24" font-weight="600" fill="#18181B">Heading</text>
  <text x="60" y="306" font-family="system-ui" font-size="18" fill="#18181B">Body text leading relaxed</text>
  <text x="60" y="334" font-family="system-ui" font-size="12" fill="#71717A" letter-spacing="0.1em">CAPTION · UPPERCASE</text>
  <!-- Component chips -->
  <rect x="60" y="380" width="120" height="44" rx="8" fill="#18181B"/>
  <text x="120" y="408" font-family="system-ui" font-size="13" font-weight="500" fill="#FFFFFF" text-anchor="middle">Primary</text>
  <rect x="196" y="380" width="120" height="44" rx="8" fill="none" stroke="#18181B" stroke-width="1.5"/>
  <text x="256" y="408" font-family="system-ui" font-size="13" font-weight="500" fill="#18181B" text-anchor="middle">Outline</text>
  <rect x="332" y="380" width="80" height="44" rx="22" fill="#F4F4F5"/>
  <text x="372" y="408" font-family="system-ui" font-size="13" fill="#18181B" text-anchor="middle">Badge</text>
  <!-- Grid -->
  <rect x="60" y="460" width="680" height="1" fill="#E4E4E7"/>
  <text x="60" y="500" font-family="system-ui" font-size="11" fill="#A1A1AA" letter-spacing="0.08em">GLYPH DESIGN SYSTEM · TOKEN FOUNDATIONS</text>
</svg>
