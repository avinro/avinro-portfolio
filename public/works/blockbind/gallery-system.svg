<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="sy-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07070D"/>
      <stop offset="100%" stop-color="#0C0C1A"/>
    </linearGradient>
    <linearGradient id="sy-brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#sy-bg)"/>
  <line x1="0" y1="300" x2="1600" y2="300" stroke="#111124" stroke-width="1"/>
  <line x1="0" y1="600" x2="1600" y2="600" stroke="#111124" stroke-width="1"/>
  <line x1="533" y1="0" x2="533" y2="900" stroke="#111124" stroke-width="1"/>
  <line x1="1067" y1="0" x2="1067" y2="900" stroke="#111124" stroke-width="1"/>

  <!-- Title -->
  <text x="80" y="72" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#F8F8FF">Design System</text>
  <text x="80" y="94" font-family="system-ui, sans-serif" font-size="12" fill="#6B7280">Color · Typography · Spacing · Components · States</text>

  <!-- COLORS section -->
  <text x="80" y="130" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#818CF8" letter-spacing="2">COLORS</text>
  <!-- Background swatch -->
  <rect x="80" y="142" width="70" height="70" rx="10" fill="#07070D" stroke="#1E1E2E" stroke-width="1"/>
  <text x="115" y="226" font-family="system-ui, sans-serif" font-size="9" fill="#6B7280" text-anchor="middle">Background</text>
  <text x="115" y="238" font-family="system-ui, monospace" font-size="8" fill="#4B5563" text-anchor="middle">#07070D</text>
  <!-- Card swatch -->
  <rect x="162" y="142" width="70" height="70" rx="10" fill="#0F0F1A" stroke="#1E1E2E" stroke-width="1"/>
  <text x="197" y="226" font-family="system-ui, sans-serif" font-size="9" fill="#6B7280" text-anchor="middle">Card</text>
  <text x="197" y="238" font-family="system-ui, monospace" font-size="8" fill="#4B5563" text-anchor="middle">#0F0F1A</text>
  <!-- Brand -->
  <rect x="244" y="142" width="70" height="70" rx="10" fill="#6366F1"/>
  <text x="279" y="226" font-family="system-ui, sans-serif" font-size="9" fill="#818CF8" text-anchor="middle">Brand</text>
  <text x="279" y="238" font-family="system-ui, monospace" font-size="8" fill="#4B5563" text-anchor="middle">#6366F1</text>
  <!-- Success green -->
  <rect x="326" y="142" width="70" height="70" rx="10" fill="#10B981"/>
  <text x="361" y="226" font-family="system-ui, sans-serif" font-size="9" fill="#10B981" text-anchor="middle">Success</text>
  <text x="361" y="238" font-family="system-ui, monospace" font-size="8" fill="#4B5563" text-anchor="middle">#10B981</text>
  <!-- Error red -->
  <rect x="408" y="142" width="70" height="70" rx="10" fill="#EF4444"/>
  <text x="443" y="226" font-family="system-ui, sans-serif" font-size="9" fill="#EF4444" text-anchor="middle">Error</text>
  <text x="443" y="238" font-family="system-ui, monospace" font-size="8" fill="#4B5563" text-anchor="middle">#EF4444</text>
  <!-- BTC orange -->
  <rect x="490" y="142" width="70" height="70" rx="10" fill="#F7931A"/>
  <text x="525" y="226" font-family="system-ui, sans-serif" font-size="9" fill="#F7931A" text-anchor="middle">Bitcoin</text>
  <text x="525" y="238" font-family="system-ui, monospace" font-size="8" fill="#4B5563" text-anchor="middle">#F7931A</text>
  <!-- ETH blue -->
  <rect x="572" y="142" width="70" height="70" rx="10" fill="#627EEA"/>
  <text x="607" y="226" font-family="system-ui, sans-serif" font-size="9" fill="#627EEA" text-anchor="middle">Ethereum</text>
  <text x="607" y="238" font-family="system-ui, monospace" font-size="8" fill="#4B5563" text-anchor="middle">#627EEA</text>
  <!-- SOL purple -->
  <rect x="654" y="142" width="70" height="70" rx="10" fill="#9945FF"/>
  <text x="689" y="226" font-family="system-ui, sans-serif" font-size="9" fill="#9945FF" text-anchor="middle">Solana</text>
  <text x="689" y="238" font-family="system-ui, monospace" font-size="8" fill="#4B5563" text-anchor="middle">#9945FF</text>

  <!-- TYPOGRAPHY section -->
  <text x="80" y="278" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#818CF8" letter-spacing="2">TYPOGRAPHY</text>
  <rect x="80" y="290" width="700" height="200" rx="12" fill="#0F0F1A" stroke="#1E1E2E" stroke-width="1"/>
  <text x="104" y="322" font-family="system-ui, sans-serif" font-size="32" font-weight="700" fill="#F8F8FF">Kanit · Headings</text>
  <text x="104" y="350" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="#F8F8FF">Aa Bb Cc 0123  Semi / Bold</text>
  <text x="104" y="384" font-family="system-ui, sans-serif" font-size="15" font-weight="400" fill="#9CA3AF">Roboto · Body text and labels</text>
  <text x="104" y="406" font-family="system-ui, sans-serif" font-size="13" fill="#6B7280">Regular weight for body · Medium for emphasis · Mono for addresses and amounts</text>
  <line x1="104" y1="424" x2="756" y2="424" stroke="#1E1E2E" stroke-width="1"/>
  <text x="104" y="445" font-family="system-ui, monospace" font-size="11" fill="#4B5563">32px Headings  ·  20px H2  ·  16px Subheading  ·  14px Body  ·  12px Caption</text>
  <text x="104" y="462" font-family="system-ui, monospace" font-size="11" fill="#4B5563">44px min touch target  ·  16px screen padding  ·  12px card padding</text>
  <text x="104" y="479" font-family="system-ui, monospace" font-size="11" fill="#4B5563">4px baseline grid  ·  All margins multiples of 4</text>

  <!-- SPACING section -->
  <text x="80" y="518" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#818CF8" letter-spacing="2">SPACING GRID</text>
  <rect x="80" y="530" width="700" height="80" rx="12" fill="#0F0F1A" stroke="#1E1E2E" stroke-width="1"/>
  <!-- 4px grid visualization -->
  <rect x="104" y="552" width="8" height="32" rx="2" fill="#6366F1"/>
  <text x="108" y="600" font-family="system-ui, monospace" font-size="9" fill="#6B7280" text-anchor="middle">4px</text>
  <rect x="124" y="548" width="12" height="36" rx="2" fill="#6366F1"/>
  <text x="130" y="600" font-family="system-ui, monospace" font-size="9" fill="#6B7280" text-anchor="middle">8px</text>
  <rect x="148" y="540" width="16" height="44" rx="2" fill="#6366F1"/>
  <text x="156" y="600" font-family="system-ui, monospace" font-size="9" fill="#6B7280" text-anchor="middle">12px</text>
  <rect x="176" y="536" width="20" height="48" rx="2" fill="#6366F1"/>
  <text x="186" y="600" font-family="system-ui, monospace" font-size="9" fill="#6B7280" text-anchor="middle">16px</text>
  <rect x="208" y="528" width="28" height="56" rx="2" fill="#818CF8"/>
  <text x="222" y="600" font-family="system-ui, monospace" font-size="9" fill="#818CF8" text-anchor="middle">20px</text>
  <rect x="248" y="520" width="36" height="64" rx="2" fill="#818CF8"/>
  <text x="266" y="600" font-family="system-ui, monospace" font-size="9" fill="#818CF8" text-anchor="middle">24px</text>
  <rect x="296" y="508" width="48" height="76" rx="2" fill="#4F46E5"/>
  <text x="320" y="600" font-family="system-ui, monospace" font-size="9" fill="#4F46E5" text-anchor="middle">32px</text>

  <!-- COMPONENTS section (right panel) -->
  <text x="840" y="130" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#818CF8" letter-spacing="2">COMPONENTS</text>

  <!-- Buttons row -->
  <text x="840" y="158" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">Buttons</text>
  <!-- Primary -->
  <rect x="840" y="166" width="140" height="40" rx="20" fill="#6366F1"/>
  <text x="910" y="191" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#F8F8FF" text-anchor="middle">Primary</text>
  <!-- Outline -->
  <rect x="992" y="166" width="140" height="40" rx="20" fill="transparent" stroke="#6366F1" stroke-width="1.5"/>
  <text x="1062" y="191" font-family="system-ui, sans-serif" font-size="12" fill="#6366F1" text-anchor="middle">Outline</text>
  <!-- Disabled -->
  <rect x="1144" y="166" width="140" height="40" rx="20" fill="#1E1E2E"/>
  <text x="1214" y="191" font-family="system-ui, sans-serif" font-size="12" fill="#374151" text-anchor="middle">Disabled</text>
  <!-- Ghost -->
  <rect x="1296" y="166" width="140" height="40" rx="20" fill="transparent"/>
  <text x="1366" y="191" font-family="system-ui, sans-serif" font-size="12" fill="#818CF8" text-anchor="middle">Ghost ’</text>

  <!-- Token cards -->
  <text x="840" y="232" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">Token card</text>
  <rect x="840" y="240" width="340" height="60" rx="10" fill="#131320" stroke="#1E1E2E" stroke-width="1"/>
  <circle cx="868" cy="270" r="16" fill="#2A1A00"/>
  <text x="868" y="275" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#F7931A" text-anchor="middle">ż</text>
  <text x="894" y="264" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#F8F8FF">Bitcoin</text>
  <text x="894" y="280" font-family="system-ui, sans-serif" font-size="10" fill="#4B5563">0.3412 BTC</text>
  <text x="1172" y="264" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#F8F8FF" text-anchor="end">$18,210</text>
  <text x="1172" y="280" font-family="system-ui, sans-serif" font-size="10" fill="#10B981" text-anchor="end">+4.2%</text>

  <!-- Input states -->
  <text x="840" y="322" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">Input states</text>
  <!-- Default -->
  <rect x="840" y="332" width="220" height="44" rx="10" fill="#131320" stroke="#2A2A44" stroke-width="1"/>
  <text x="856" y="359" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">Amount in USD</text>
  <!-- Active -->
  <rect x="1072" y="332" width="220" height="44" rx="10" fill="#131320" stroke="#6366F1" stroke-width="1.5"/>
  <text x="1088" y="359" font-family="system-ui, sans-serif" font-size="11" fill="#F8F8FF">$250.00</text>
  <!-- Error -->
  <rect x="1304" y="332" width="220" height="44" rx="10" fill="#1A0A0A" stroke="#EF4444" stroke-width="1.5"/>
  <text x="1320" y="359" font-family="system-ui, sans-serif" font-size="11" fill="#EF4444">Insufficient funds</text>

  <!-- Bottom sheet -->
  <text x="840" y="400" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">Bottom sheet</text>
  <rect x="840" y="410" width="280" height="120" rx="16" fill="#0F0F1A" stroke="#1E1E2E" stroke-width="1"/>
  <rect x="895" y="424" width="70" height="5" rx="2.5" fill="#2A2A44"/>
  <text x="980" y="458" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#F8F8FF" text-anchor="middle">Choose Network</text>
  <rect x="856" y="470" width="248" height="36" rx="8" fill="#1A1A2E"/>
  <text x="980" y="493" font-family="system-ui, sans-serif" font-size="11" fill="#627EEA" text-anchor="middle">Ethereum Mainnet</text>
  <rect x="856" y="514" width="248" height="1" fill="#1E1E2E"/>

  <!-- Swipe button -->
  <text x="1140" y="400" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">Swipe to confirm</text>
  <rect x="1140" y="410" width="280" height="64" rx="32" fill="#1E1E2E" stroke="#2A2A44" stroke-width="1.5"/>
  <circle cx="1180" cy="442" r="26" fill="url(#sy-brand)"/>
  <text x="1180" y="448" font-family="system-ui, sans-serif" font-size="16" fill="#F8F8FF" text-anchor="middle">’</text>
  <text x="1300" y="447" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">Swipe to confirm</text>

  <!-- Toast -->
  <text x="840" y="556" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">Toast notification</text>
  <rect x="840" y="566" width="280" height="52" rx="10" fill="#0A1F12" stroke="#10B981" stroke-width="1"/>
  <circle cx="864" cy="592" r="12" fill="#10B981"/>
  <text x="864" y="597" font-family="system-ui, sans-serif" font-size="10" fill="#F8F8FF" text-anchor="middle"></text>
  <text x="884" y="588" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#10B981">Transaction confirmed</text>
  <text x="884" y="604" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">0.25 ETH sent · View on Etherscan</text>

  <!-- Label -->
  <rect x="80" y="820" width="5" height="44" rx="2.5" fill="url(#sy-brand)"/>
  <text x="98" y="844" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8F8FF">BlockBind · Design System</text>
  <text x="98" y="862" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">Color · Typography · 4px grid · Buttons · Token cards · Inputs · Sheets · Swipe · Toasts</text>
</svg>
