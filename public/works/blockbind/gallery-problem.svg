<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="pb-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07070D"/>
      <stop offset="100%" stop-color="#0C0C1A"/>
    </linearGradient>
    <linearGradient id="pb-brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#pb-bg)"/>
  <line x1="0" y1="300" x2="1600" y2="300" stroke="#111124" stroke-width="1"/>
  <line x1="0" y1="600" x2="1600" y2="600" stroke="#111124" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="900" stroke="#1E1E2E" stroke-width="2" stroke-dasharray="6 6"/>

  <!-- Section headers -->
  <rect x="80" y="60" width="140" height="30" rx="6" fill="#2A1A1A"/>
  <text x="150" y="81" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#EF4444" text-anchor="middle">Before</text>
  <rect x="880" y="60" width="140" height="30" rx="6" fill="#0A1F12"/>
  <text x="950" y="81" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#10B981" text-anchor="middle">After · BlockBind</text>

  <!-- VS divider icon -->
  <circle cx="800" cy="450" r="36" fill="#131320" stroke="#1E1E2E" stroke-width="2"/>
  <text x="800" y="458" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#6366F1" text-anchor="middle">VS</text>

  <!-- LEFT side: Problems -->
  <!-- Problem 1: Information overload -->
  <rect x="80" y="114" width="660" height="90" rx="12" fill="#131320" stroke="#2A1A1A" stroke-width="1.5"/>
  <rect x="80" y="114" width="5" height="90" rx="2.5" fill="#EF4444"/>
  <text x="104" y="142" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8F8FF">Information overload</text>
  <text x="104" y="162" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">Wallet shows raw hex addresses, gas wei values,</text>
  <text x="104" y="178" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">nonce counters, and EIP-1559 base fee fields</text>
  <text x="104" y="196" font-family="system-ui, sans-serif" font-size="10" fill="#EF4444">User exits at first screen</text>

  <!-- Problem 2: Hidden price data -->
  <rect x="80" y="220" width="660" height="90" rx="12" fill="#131320" stroke="#2A1A1A" stroke-width="1.5"/>
  <rect x="80" y="220" width="5" height="90" rx="2.5" fill="#EF4444"/>
  <text x="104" y="248" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8F8FF">Price data buried deep</text>
  <text x="104" y="268" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">Charts are hidden behind 34 taps. No quick way to</text>
  <text x="104" y="284" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">see if your portfolio is up or down today</text>
  <text x="104" y="302" font-family="system-ui, sans-serif" font-size="10" fill="#EF4444">Core feature not visible from home screen</text>

  <!-- Problem 3: Accessibility gap -->
  <rect x="80" y="326" width="660" height="90" rx="12" fill="#131320" stroke="#2A1A1A" stroke-width="1.5"/>
  <rect x="80" y="326" width="5" height="90" rx="2.5" fill="#EF4444"/>
  <text x="104" y="354" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8F8FF">Technical jargon everywhere</text>
  <text x="104" y="374" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">Users must understand "gas", "slippage tolerance",</text>
  <text x="104" y="390" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">"ERC-20 approval", and "nonce" to complete a swap</text>
  <text x="104" y="408" font-family="system-ui, sans-serif" font-size="10" fill="#EF4444">Non-crypto users cannot complete core flows</text>

  <!-- Problem 4: Risky transactions -->
  <rect x="80" y="432" width="660" height="90" rx="12" fill="#131320" stroke="#2A1A1A" stroke-width="1.5"/>
  <rect x="80" y="432" width="5" height="90" rx="2.5" fill="#EF4444"/>
  <text x="104" y="460" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8F8FF">One-tap irreversible transactions</text>
  <text x="104" y="480" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">A single misclick sends funds to the wrong address.</text>
  <text x="104" y="496" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">No friction between intent and execution</text>
  <text x="104" y="514" font-family="system-ui, sans-serif" font-size="10" fill="#EF4444">High cost of error, no recovery</text>

  <!-- Problem 5: No system -->
  <rect x="80" y="538" width="660" height="90" rx="12" fill="#131320" stroke="#2A1A1A" stroke-width="1.5"/>
  <rect x="80" y="538" width="5" height="90" rx="2.5" fill="#EF4444"/>
  <text x="104" y="566" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8F8FF">Inconsistent visual patterns</text>
  <text x="104" y="586" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">Each screen looks different. Colors, spacing, and</text>
  <text x="104" y="602" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">typography vary with no underlying system</text>
  <text x="104" y="620" font-family="system-ui, sans-serif" font-size="10" fill="#EF4444">Erodes trust and feels unfinished</text>

  <!-- RIGHT side: Solutions -->
  <!-- Solution 1 -->
  <rect x="860" y="114" width="660" height="90" rx="12" fill="#131320" stroke="#0A1F12" stroke-width="1.5"/>
  <rect x="860" y="114" width="5" height="90" rx="2.5" fill="#10B981"/>
  <text x="884" y="142" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8F8FF">Clear information hierarchy</text>
  <text x="884" y="162" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">Dollar values first. Balance, performance, and key</text>
  <text x="884" y="178" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">actions visible at a glance from the home screen</text>
  <text x="884" y="196" font-family="system-ui, sans-serif" font-size="10" fill="#10B981">Technical data available, never required</text>

  <!-- Solution 2 -->
  <rect x="860" y="220" width="660" height="90" rx="12" fill="#131320" stroke="#0A1F12" stroke-width="1.5"/>
  <rect x="860" y="220" width="5" height="90" rx="2.5" fill="#10B981"/>
  <text x="884" y="248" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8F8FF">Portfolio performance front and center</text>
  <text x="884" y="268" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">Total balance, gain/loss, and percentage change visible</text>
  <text x="884" y="284" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">on the home screen. Per-token charts one tap away</text>
  <text x="884" y="302" font-family="system-ui, sans-serif" font-size="10" fill="#10B981">Most-used data requires zero navigation</text>

  <!-- Solution 3 -->
  <rect x="860" y="326" width="660" height="90" rx="12" fill="#131320" stroke="#0A1F12" stroke-width="1.5"/>
  <rect x="860" y="326" width="5" height="90" rx="2.5" fill="#10B981"/>
  <text x="884" y="354" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8F8FF">Plain-language UX copy</text>
  <text x="884" y="374" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">"Send", "Receive", "Swap" instead of technical terms.</text>
  <text x="884" y="390" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">Fees shown in dollars. No crypto literacy required</text>
  <text x="884" y="408" font-family="system-ui, sans-serif" font-size="10" fill="#10B981">Any user can complete a transaction</text>

  <!-- Solution 4 -->
  <rect x="860" y="432" width="660" height="90" rx="12" fill="#131320" stroke="#0A1F12" stroke-width="1.5"/>
  <rect x="860" y="432" width="5" height="90" rx="2.5" fill="#10B981"/>
  <text x="884" y="460" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8F8FF">Swipe-to-confirm critical actions</text>
  <text x="884" y="480" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">Intentional friction before sending or swapping.</text>
  <text x="884" y="496" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">A full confirmation screen shows all details first</text>
  <text x="884" y="514" font-family="system-ui, sans-serif" font-size="10" fill="#10B981">Reduces accidental irreversible submissions</text>

  <!-- Solution 5 -->
  <rect x="860" y="538" width="660" height="90" rx="12" fill="#131320" stroke="#0A1F12" stroke-width="1.5"/>
  <rect x="860" y="538" width="5" height="90" rx="2.5" fill="#10B981"/>
  <text x="884" y="566" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8F8FF">Unified visual system at scale</text>
  <text x="884" y="586" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">30+ screens. One component library. 4px grid,</text>
  <text x="884" y="602" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">Kanit headings, functional color, consistent tokens</text>
  <text x="884" y="620" font-family="system-ui, sans-serif" font-size="10" fill="#10B981">Coherent product that scales with new features</text>

  <!-- Label -->
  <rect x="80" y="820" width="5" height="44" rx="2.5" fill="url(#pb-brand)"/>
  <text x="98" y="844" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8F8FF">BlockBind · Design Challenge</text>
  <text x="98" y="862" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">Five friction points. Five product decisions. Accessibility without compromise.</text>
</svg>
