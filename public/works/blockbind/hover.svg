<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="hv-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07070D"/>
      <stop offset="100%" stop-color="#0C0C1A"/>
    </linearGradient>
    <linearGradient id="hv-brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <radialGradient id="hv-glow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#hv-bg)"/>
  <ellipse cx="800" cy="450" rx="750" ry="550" fill="url(#hv-glow)"/>

  <!-- Grid lines -->
  <line x1="0" y1="300" x2="1600" y2="300" stroke="#111124" stroke-width="1"/>
  <line x1="0" y1="600" x2="1600" y2="600" stroke="#111124" stroke-width="1"/>
  <line x1="533" y1="0" x2="533" y2="900" stroke="#111124" stroke-width="1"/>
  <line x1="1067" y1="0" x2="1067" y2="900" stroke="#111124" stroke-width="1"/>

  <!-- 3-phone send flow sequence -->
  <!-- Phone 1  Enter address -->
  <rect x="140" y="100" width="280" height="560" rx="36" fill="#0F0F1A" stroke="#1E1E2E" stroke-width="2"/>
  <rect x="150" y="116" width="260" height="528" rx="26" fill="#0A0A12"/>
  <rect x="218" y="124" width="84" height="20" rx="10" fill="#0F0F1A"/>
  <text x="280" y="162" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8F8FF" text-anchor="middle">Send Crypto</text>
  <text x="167" y="185" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">Recipient address</text>
  <rect x="162" y="194" width="236" height="44" rx="10" fill="#131320" stroke="#2A2A44" stroke-width="1"/>
  <text x="280" y="221" font-family="system-ui, sans-serif" font-size="10" fill="#6366F1" text-anchor="middle">0x71C7656E...A26</text>
  <text x="167" y="258" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">Amount</text>
  <rect x="162" y="266" width="236" height="60" rx="10" fill="#131320" stroke="#6366F1" stroke-width="1.5"/>
  <text x="280" y="300" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#F8F8FF" text-anchor="middle">0.25 ETH</text>
  <text x="280" y="318" font-family="system-ui, sans-serif" font-size="10" fill="#4B5563" text-anchor="middle">H $476.25 USD</text>
  <text x="167" y="348" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">Network</text>
  <rect x="162" y="356" width="236" height="40" rx="10" fill="#131320" stroke="#2A2A44" stroke-width="1"/>
  <circle cx="182" cy="376" r="10" fill="#0D1426"/>
  <text x="182" y="380" font-family="system-ui, sans-serif" font-size="8" fill="#627EEA" text-anchor="middle">ž</text>
  <text x="200" y="380" font-family="system-ui, sans-serif" font-size="11" fill="#F8F8FF">Ethereum Mainnet</text>
  <text x="390" y="380" font-family="system-ui, sans-serif" font-size="12" fill="#6B7280" text-anchor="end">:</text>
  <rect x="162" y="410" width="236" height="44" rx="22" fill="url(#hv-brand)"/>
  <text x="280" y="438" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8F8FF" text-anchor="middle">Review Transaction</text>
  <text x="167" y="480" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">Step 1 of 3</text>

  <!-- Phone 2  Confirm details -->
  <rect x="660" y="100" width="280" height="560" rx="36" fill="#0F0F1A" stroke="#6366F1" stroke-width="2"/>
  <rect x="670" y="116" width="260" height="528" rx="26" fill="#0A0A12"/>
  <rect x="738" y="124" width="84" height="20" rx="10" fill="#0F0F1A"/>
  <text x="800" y="162" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8F8FF" text-anchor="middle">Confirm Details</text>
  <rect x="682" y="178" width="236" height="180" rx="16" fill="#131320" stroke="#1E1E2E" stroke-width="1"/>
  <text x="700" y="204" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">Sending</text>
  <text x="910" y="204" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#F8F8FF" text-anchor="end">0.25 ETH</text>
  <text x="910" y="220" font-family="system-ui, sans-serif" font-size="10" fill="#4B5563" text-anchor="end">$476.25</text>
  <line x1="682" y1="234" x2="918" y2="234" stroke="#1E1E2E" stroke-width="1"/>
  <text x="700" y="254" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">To</text>
  <text x="910" y="254" font-family="system-ui, sans-serif" font-size="10" fill="#F8F8FF" text-anchor="end">0x71C7...A26</text>
  <text x="700" y="278" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">Network</text>
  <text x="910" y="278" font-family="system-ui, sans-serif" font-size="10" fill="#627EEA" text-anchor="end">Ethereum</text>
  <text x="700" y="302" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">Network fee</text>
  <text x="910" y="302" font-family="system-ui, sans-serif" font-size="10" fill="#F8F8FF" text-anchor="end">$3.20</text>
  <text x="700" y="326" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">Total</text>
  <text x="910" y="326" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#F8F8FF" text-anchor="end">$479.45</text>
  <text x="700" y="350" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">ETA</text>
  <text x="910" y="350" font-family="system-ui, sans-serif" font-size="10" fill="#10B981" text-anchor="end">~15 seconds</text>
  <!-- Swipe button -->
  <rect x="682" y="378" width="236" height="56" rx="28" fill="#1E1E2E" stroke="#2A2A44" stroke-width="1.5"/>
  <circle cx="716" cy="406" r="22" fill="url(#hv-brand)"/>
  <text x="716" y="412" font-family="system-ui, sans-serif" font-size="14" fill="#F8F8FF" text-anchor="middle">’</text>
  <text x="820" y="411" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">Swipe to send</text>
  <text x="700" y="460" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">Step 2 of 3</text>

  <!-- Phone 3  Success -->
  <rect x="1180" y="100" width="280" height="560" rx="36" fill="#0F0F1A" stroke="#1E1E2E" stroke-width="2"/>
  <rect x="1190" y="116" width="260" height="528" rx="26" fill="#0A0A12"/>
  <rect x="1258" y="124" width="84" height="20" rx="10" fill="#0F0F1A"/>
  <circle cx="1320" cy="270" r="50" fill="#0A1F12" stroke="#10B981" stroke-width="2"/>
  <text x="1320" y="280" font-family="system-ui, sans-serif" font-size="32" fill="#10B981" text-anchor="middle"></text>
  <text x="1320" y="346" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#F8F8FF" text-anchor="middle">Sent!</text>
  <text x="1320" y="368" font-family="system-ui, sans-serif" font-size="12" fill="#10B981" text-anchor="middle">0.25 ETH · $476.25</text>
  <text x="1320" y="390" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">Transaction submitted</text>
  <text x="1320" y="408" font-family="system-ui, sans-serif" font-size="10" fill="#4B5563" text-anchor="middle">View on Etherscan ’</text>
  <rect x="1202" y="432" width="236" height="44" rx="22" fill="url(#hv-brand)"/>
  <text x="1320" y="460" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8F8FF" text-anchor="middle">Back to Home</text>
  <text x="1202" y="500" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">Step 3 of 3</text>

  <!-- Step arrows between phones -->
  <text x="586" y="390" font-family="system-ui, sans-serif" font-size="28" fill="#2A2A44" text-anchor="middle">’</text>
  <text x="1106" y="390" font-family="system-ui, sans-serif" font-size="28" fill="#2A2A44" text-anchor="middle">’</text>

  <!-- Label -->
  <rect x="80" y="820" width="5" height="44" rx="2.5" fill="url(#hv-brand)"/>
  <text x="98" y="844" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8F8FF">BlockBind · Send Flow</text>
  <text x="98" y="862" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">Enter address ’ Confirm details ’ Transaction success</text>
</svg>
