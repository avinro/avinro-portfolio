<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="sw-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07070D"/>
      <stop offset="100%" stop-color="#0C0C1A"/>
    </linearGradient>
    <linearGradient id="sw-brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#sw-bg)"/>
  <line x1="0" y1="300" x2="1600" y2="300" stroke="#111124" stroke-width="1"/>
  <line x1="0" y1="600" x2="1600" y2="600" stroke="#111124" stroke-width="1"/>

  <!-- Step labels -->
  <rect x="140" y="60" width="100" height="28" rx="14" fill="#1A1A2E"/>
  <text x="190" y="79" font-family="system-ui, sans-serif" font-size="11" fill="#818CF8" text-anchor="middle">Step 1</text>
  <rect x="660" y="60" width="100" height="28" rx="14" fill="#1A1A2E"/>
  <text x="710" y="79" font-family="system-ui, sans-serif" font-size="11" fill="#818CF8" text-anchor="middle">Step 2</text>
  <rect x="1180" y="60" width="100" height="28" rx="14" fill="#6366F1"/>
  <text x="1230" y="79" font-family="system-ui, sans-serif" font-size="11" fill="#F8F8FF" text-anchor="middle">Step 3</text>

  <!-- PHONE 1: Select tokens -->
  <rect x="60" y="100" width="280" height="560" rx="36" fill="#0F0F1A" stroke="#1E1E2E" stroke-width="2"/>
  <rect x="70" y="116" width="260" height="528" rx="26" fill="#0A0A12"/>
  <rect x="148" y="124" width="84" height="20" rx="10" fill="#0F0F1A"/>
  <text x="200" y="162" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8F8FF" text-anchor="middle">Swap</text>

  <!-- From field -->
  <text x="86" y="190" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">From</text>
  <rect x="82" y="200" width="236" height="76" rx="14" fill="#131320" stroke="#2A2A44" stroke-width="1"/>
  <circle cx="104" cy="230" r="14" fill="#2A1A00"/>
  <text x="104" y="235" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#F7931A" text-anchor="middle">ż</text>
  <text x="126" y="226" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8F8FF">Bitcoin</text>
  <text x="126" y="242" font-family="system-ui, sans-serif" font-size="10" fill="#4B5563">0.3412 BTC available</text>
  <text x="310" y="230" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#F8F8FF" text-anchor="end">0.1</text>
  <text x="310" y="248" font-family="system-ui, sans-serif" font-size="10" fill="#4B5563" text-anchor="end">H $6,031</text>

  <!-- Swap arrows -->
  <circle cx="200" cy="298" r="20" fill="#1A1A2E" stroke="#2A2A44" stroke-width="1.5"/>
  <text x="200" y="304" font-family="system-ui, sans-serif" font-size="14" fill="#6366F1" text-anchor="middle">Ĺ</text>

  <!-- To field -->
  <text x="86" y="340" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">To</text>
  <rect x="82" y="350" width="236" height="76" rx="14" fill="#131320" stroke="#6366F1" stroke-width="1.5"/>
  <circle cx="104" cy="380" r="14" fill="#0D1426"/>
  <text x="104" y="385" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#627EEA" text-anchor="middle">ž</text>
  <text x="126" y="376" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8F8FF">Ethereum</text>
  <text x="126" y="392" font-family="system-ui, sans-serif" font-size="10" fill="#4B5563">H 1 BTC = 17.42 ETH</text>
  <text x="310" y="380" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#6366F1" text-anchor="end">1.742</text>
  <text x="310" y="396" font-family="system-ui, sans-serif" font-size="10" fill="#4B5563" text-anchor="end">ETH</text>

  <!-- Rate info -->
  <rect x="82" y="442" width="236" height="48" rx="10" fill="#131320" stroke="#1E1E2E" stroke-width="1"/>
  <text x="96" y="462" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">Rate</text>
  <text x="310" y="462" font-family="system-ui, sans-serif" font-size="10" fill="#F8F8FF" text-anchor="end">1 BTC = 17.42 ETH</text>
  <text x="96" y="480" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">Provider</text>
  <text x="310" y="480" font-family="system-ui, sans-serif" font-size="10" fill="#818CF8" text-anchor="end">1inch</text>

  <rect x="82" y="506" width="236" height="44" rx="22" fill="url(#sw-brand)"/>
  <text x="200" y="534" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8F8FF" text-anchor="middle">Preview Swap</text>

  <!-- ARROW 1’2 -->
  <text x="390" y="400" font-family="system-ui, sans-serif" font-size="32" fill="#2A2A44" text-anchor="middle">’</text>

  <!-- PHONE 2: Review -->
  <rect x="580" y="100" width="280" height="560" rx="36" fill="#0F0F1A" stroke="#6366F1" stroke-width="2"/>
  <rect x="590" y="116" width="260" height="528" rx="26" fill="#0A0A12"/>
  <rect x="668" y="124" width="84" height="20" rx="10" fill="#0F0F1A"/>
  <text x="720" y="162" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8F8FF" text-anchor="middle">Review Swap</text>

  <!-- Summary card -->
  <rect x="602" y="180" width="236" height="220" rx="16" fill="#131320" stroke="#1E1E2E" stroke-width="1"/>

  <!-- From -->
  <text x="618" y="208" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">You're sending</text>
  <circle cx="634" cy="234" r="14" fill="#2A1A00"/>
  <text x="634" y="239" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#F7931A" text-anchor="middle">ż</text>
  <text x="656" y="232" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#F8F8FF">0.1 BTC</text>
  <text x="656" y="248" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">H $6,031.00</text>

  <!-- Divider with arrow -->
  <circle cx="720" cy="276" r="14" fill="#1A1A2E"/>
  <text x="720" y="281" font-family="system-ui, sans-serif" font-size="11" fill="#6366F1" text-anchor="middle">“</text>

  <!-- To -->
  <text x="618" y="304" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">You're receiving</text>
  <circle cx="634" cy="330" r="14" fill="#0D1426"/>
  <text x="634" y="335" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#627EEA" text-anchor="middle">ž</text>
  <text x="656" y="328" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6366F1">1.742 ETH</text>
  <text x="656" y="344" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">H $6,001.50</text>

  <!-- Fee details -->
  <rect x="602" y="414" width="236" height="80" rx="12" fill="#0F0F1A" stroke="#1E1E2E" stroke-width="1"/>
  <text x="618" y="438" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">Network fee</text>
  <text x="830" y="438" font-family="system-ui, sans-serif" font-size="10" fill="#F8F8FF" text-anchor="end">H $3.20</text>
  <text x="618" y="458" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">Price impact</text>
  <text x="830" y="458" font-family="system-ui, sans-serif" font-size="10" fill="#10B981" text-anchor="end">0.3%</text>
  <text x="618" y="478" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">Provider</text>
  <text x="830" y="478" font-family="system-ui, sans-serif" font-size="10" fill="#818CF8" text-anchor="end">1inch · Best rate</text>

  <!-- Swipe button -->
  <rect x="602" y="508" width="236" height="56" rx="28" fill="#1E1E2E" stroke="#2A2A44" stroke-width="1.5"/>
  <circle cx="636" cy="536" r="22" fill="url(#sw-brand)"/>
  <text x="636" y="542" font-family="system-ui, sans-serif" font-size="13" fill="#F8F8FF" text-anchor="middle">’</text>
  <text x="740" y="541" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">Swipe to swap</text>

  <!-- ARROW 2’3 -->
  <text x="910" y="400" font-family="system-ui, sans-serif" font-size="32" fill="#2A2A44" text-anchor="middle">’</text>

  <!-- PHONE 3: Success -->
  <rect x="1100" y="100" width="280" height="560" rx="36" fill="#0F0F1A" stroke="#10B981" stroke-width="2"/>
  <rect x="1110" y="116" width="260" height="528" rx="26" fill="#0A0A12"/>
  <rect x="1188" y="124" width="84" height="20" rx="10" fill="#0F0F1A"/>

  <!-- Success state -->
  <circle cx="1240" cy="280" r="60" fill="#0A1F12" stroke="#10B981" stroke-width="2.5"/>
  <text x="1240" y="294" font-family="system-ui, sans-serif" font-size="42" fill="#10B981" text-anchor="middle"></text>

  <text x="1240" y="368" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#F8F8FF" text-anchor="middle">Swap complete!</text>

  <rect x="1118" y="388" width="244" height="72" rx="14" fill="#131320" stroke="#1E1E2E" stroke-width="1"/>
  <text x="1126" y="410" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">Received</text>
  <text x="1354" y="410" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#10B981" text-anchor="end">1.742 ETH</text>
  <text x="1126" y="430" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">Sent</text>
  <text x="1354" y="430" font-family="system-ui, sans-serif" font-size="12" fill="#F8F8FF" text-anchor="end">0.1 BTC</text>
  <text x="1126" y="450" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">Tx hash</text>
  <text x="1354" y="450" font-family="system-ui, sans-serif" font-size="10" fill="#818CF8" text-anchor="end">0x4f2a...d931</text>

  <text x="1240" y="492" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563" text-anchor="middle">View on Etherscan ’</text>

  <rect x="1118" y="510" width="244" height="44" rx="22" fill="url(#sw-brand)"/>
  <text x="1240" y="538" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8F8FF" text-anchor="middle">Back to Home</rect>

  <!-- Label -->
  <rect x="80" y="820" width="5" height="44" rx="2.5" fill="url(#sw-brand)"/>
  <text x="98" y="844" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#F8F8FF">BlockBind · Swap Token Flow</text>
  <text x="98" y="862" font-family="system-ui, sans-serif" font-size="11" fill="#4B5563">Select tokens · Review rate, provider, and fees · Swipe to confirm</text>
</svg>
