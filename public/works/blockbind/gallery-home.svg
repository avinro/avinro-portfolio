  <text x="964" y="538" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#9945FF">Right: Solana annotation</text>
  <text x="964" y="553" font-family="system-ui, sans-serif" font-size="9" fill="#6B7280">Brand token colors used</text>
