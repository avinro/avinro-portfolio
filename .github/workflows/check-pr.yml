name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Typecheck / Lint / Format / Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

  supabase:
    name: DB migrations / RLS / types drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local stack
        run: supabase start

      - name: Apply migrations and seed
        run: supabase db reset

      - name: Run pgTAP RLS tests
        run: supabase test db

      - name: Check generated types are up to date
        run: |
          supabase gen types typescript --local --schema public > /tmp/generated_types.ts
          if ! diff -q /tmp/generated_types.ts src/types/database.ts > /dev/null 2>&1; then
            echo "Types drift detected — run 'npm run gen:types' and commit the result."
            diff /tmp/generated_types.ts src/types/database.ts
            exit 1
          fi

  commitlint:
    name: Commit message lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint commit messages
        run: npx commitlint --from=${{ github.event.pull_request.base.sha }} --to=${{ github.event.pull_request.head.sha }} --verbose
