name: Lighthouse Audit

# Triggered when Vercel posts a successful deployment status for a PR preview.
# Vercel's GitHub App fires deployment_status on every preview deploy, providing
# the live preview URL via github.event.deployment_status.environment_url.
# This lets us audit the real CDN-served output rather than a local build.
on:
  deployment_status:

jobs:
  lighthouse:
    # Only run when Vercel (or another provider) marks the deployment as success.
    if: github.event.deployment_status.state == 'success'
    name: Lighthouse mobile audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          # Audit all public routes in the Vercel preview.
          urls: |
            ${{ github.event.deployment_status.environment_url }}
            ${{ github.event.deployment_status.environment_url }}/work
            ${{ github.event.deployment_status.environment_url }}/work/hello-dojo
            ${{ github.event.deployment_status.environment_url }}/about
            ${{ github.event.deployment_status.environment_url }}/contact
          configPath: ".lighthouserc.json"
          # Upload results to Lighthouse CI's temporary public storage so the
          # links appear in the step summary. No token or external server needed.
          uploadArtifacts: true
          temporaryPublicStorage: true
