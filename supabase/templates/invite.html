<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>You've been invited — Design Leads</title>
  </head>
  <body
    style="
      font-family: system-ui, -apple-system, sans-serif;
      background: #f9f9f9;
      margin: 0;
      padding: 32px 16px;
      color: #111;
    "
  >
    <table
      width="100%"
      cellpadding="0"
      cellspacing="0"
      style="max-width: 480px; margin: 0 auto"
    >
      <tr>
        <td
          style="
            background: #ffffff;
            border-radius: 12px;
            padding: 40px 36px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
          "
        >
          <p
            style="
              font-size: 13px;
              font-weight: 600;
              letter-spacing: 0.08em;
              text-transform: uppercase;
              color: #888;
              margin: 0 0 24px;
            "
          >
            Design Leads
          </p>
          <h1 style="font-size: 22px; font-weight: 700; margin: 0 0 12px">
            You've been invited
          </h1>
          <p style="font-size: 15px; color: #444; margin: 0 0 28px">
            You have been invited to access a client project. Click the button
            below to create your account and get started.
          </p>
          <a
            href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=invite&next=/client"
            style="
              display: inline-block;
              background: #111;
              color: #fff;
              text-decoration: none;
              font-size: 15px;
              font-weight: 600;
              padding: 12px 28px;
              border-radius: 8px;
            "
          >
            Accept invitation
          </a>
          <p style="font-size: 13px; color: #888; margin: 28px 0 0">
            If you were not expecting an invitation, you can safely ignore this
            email.
          </p>
        </td>
      </tr>
    </table>
  </body>
</html>
